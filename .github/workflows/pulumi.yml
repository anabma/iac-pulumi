# .github/workflows/pulumi.yml
#
# GitHub Actions CI/CD pipeline.
# State is stored in S3 – no Pulumi Cloud account needed.
#
# Secrets to set in GitHub (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         – your AWS IAM access key
#   AWS_SECRET_ACCESS_KEY     – your AWS IAM secret key
#   PULUMI_CONFIG_PASSPHRASE  – leave empty (just press Enter when asked)
#   DB_PASSWORD               – Pulumi123
#   SSH_PUBLIC_KEY            – contents of ~/.ssh/id_rsa.pub

name: Pulumi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-north-1
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

jobs:

  preview:
    name: pulumi preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Login to S3 backend
        run: pulumi login s3://client-pulumi-state

      - name: Set secrets from GitHub Secrets
        run: |
          pulumi config set --secret client-infrastructure:db_password "${{ secrets.DB_PASSWORD }}" --stack dev
          pulumi config set client-infrastructure:ssh_public_key "${{ secrets.SSH_PUBLIC_KEY }}" --stack dev

      - name: pulumi preview
        run: pulumi preview --stack dev

  deploy:
    name: pulumi up
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Login to S3 backend
        run: pulumi login s3://client-pulumi-state

      - name: Set secrets from GitHub Secrets
        run: |
          pulumi config set --secret client-infrastructure:db_password "${{ secrets.DB_PASSWORD }}" --stack dev
          pulumi config set client-infrastructure:ssh_public_key "${{ secrets.SSH_PUBLIC_KEY }}" --stack dev

      - name: pulumi up
        run: pulumi up --stack dev --yes
